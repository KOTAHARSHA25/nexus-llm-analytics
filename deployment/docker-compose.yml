version: '3.8'

services:
  backend:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    container_name: nexus-backend
    ports:
      - "8000:8000"
    volumes:
      - ../data:/app/data
      - ../logs:/app/logs
    environment:
      - ENVIRONMENT=production
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - CHROMA_DB_IMPL=sqlite
      - ENABLE_CODE_SANDBOX=true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  frontend:
    # Assuming frontend is part of the same repo or a separate build context
    # For now, we use a placeholder or assume a streamlit command in the same container if monolithic
    # If monolithic, remove this service and run streamlit alongside (not recommended)
    # Ideally, you have a separate Dockerfile for frontend.
    image: nexus-backend:latest # Re-using backend image for simplicity if streamlit is installed there
    container_name: nexus-frontend
    command: streamlit run src/frontend/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  nexus_data:
